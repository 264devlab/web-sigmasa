<section class="stacking-section">
  <div class="container stacking-container">
    @for (item of cards; track $index) {
    <app-stacking-card [title]="item.titleKey | i18n" [description]="item.descriptionKey | i18n" [index]="$index"
      [totalCards]="cards.length"></app-stacking-card>
    }
  </div>
</section>
