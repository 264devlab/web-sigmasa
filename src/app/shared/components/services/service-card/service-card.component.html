<div class="service-card">
  <div class="card-content">
    <div class="header-group">
      <div class="icon-container">
        <img [src]="icon" [alt]="titleKey | i18n" />
      </div>
      <h3 class="text-raleway-medium-32 title">{{ titleKey | i18n }}</h3>
    </div>

    <div class="separator-line"></div>

    <div class="description-container">
      <p
        class="text-raleway-medium-20 description"
        [innerHTML]="formatDescription(descriptionKey | i18n)"
      ></p>
    </div>
  </div>
</div>
