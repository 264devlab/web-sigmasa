<section class="clients-section">
  <div class="container">
    <h2 class="text-inter-medium-40 title">Clientes</h2>

    <div class="logos-carousel">
      <div class="logos-track">
        @for (logo of scrollingLogos; track $index) {
        <div class="logo-item">
          <img [src]="logo" alt="Logo Cliente" />
        </div>
        }
      </div>
    </div>
  </div>
</section>
