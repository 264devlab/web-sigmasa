<div class="hero-action">
    <button class="hero-btn" [routerLink]="link || null" (click)="onButtonClick($event)">
        <span class="hero-btn-text">{{ text }}</span>
        <span class="hero-btn-icon">
            <span class="material-symbols-outlined" translate="no">arrow_forward</span>
        </span>
    </button>
</div>
