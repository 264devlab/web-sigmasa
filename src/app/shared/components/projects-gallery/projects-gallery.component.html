<div class="gallery-container" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
    <div class="projects-grid" [class.is-animating]="isAnimating()">
        @for (project of paginatedProjects(); track project.id; let i = $index) {
        <div class="project-card" [style.--index]="i">
            <div class="image-wrapper">
                <img [src]="project.image" [alt]="project.name">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3 class="project-name text-raleway-medium-32">{{ project.name }}</h3>
                        <p class="project-desc text-raleway-light-16">{{ project.description }}</p>
                        <a href="#" class="read-more text-raleway-medium-20">{{ 'projects.read-more' | i18n }}</a>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>

    <div class="pagination" *ngIf="totalPages() > 1">
        <button (click)="prevPage()" class="page-btn prev">
            <span class="material-icons">chevron_left</span>
        </button>

        <div class="page-indicators">
            <span *ngFor="let p of [].constructor(totalPages()); let i = index" (click)="changePage(i + 1)"
                [class.active]="currentPage() === i + 1" class="indicator">
            </span>
        </div>

        <button (click)="nextPage()" class="page-btn next">
            <span class="material-icons">chevron_right</span>
        </button>
    </div>
</div>
